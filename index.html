<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA CLOUD - Monitoring Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
  background: #0a0e17;
  color: #e0e6ed;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0e17; }
::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }

/* Loading screen */
#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0e17; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #1e3a5f;
  border-top-color: #00d4ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #4a5568; font-size: 14px; }

/* Header */
.header {
  background: linear-gradient(135deg, #0d1117, #161b22);
  border-bottom: 1px solid #1e3a5f;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0; z-index: 100;
}
.logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #00d4ff, #007bff);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
  flex-shrink: 0;
}
.header-title { font-size: 18px; font-weight: 700; color: #e0e6ed; }
.header-title span { color: #00d4ff; }
.header-right { margin-right: auto; display: flex; align-items: center; gap: 12px; }
.status-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
.status-dot.offline { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
.stat-card {
  background: #111827;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.stat-label { font-size: 12px; color: #4a5568; margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 800; }
.stat-card:nth-child(1) .stat-value { color: #00d4ff; }
.stat-card:nth-child(2) .stat-value { color: #00ff88; }
.stat-card:nth-child(3) .stat-value { color: #ff6b6b; }
.stat-card:nth-child(4) .stat-value { color: #fbbf24; }

/* Layout */
.main-wrap {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 16px;
  padding: 0 16px 16px;
  max-width: 1200px;
  margin: 0 auto;
}
@media (max-width: 700px) {
  .main-wrap { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Cards */
.card {
  background: #111827;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 15px; font-weight: 700; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.card-badge {
  background: #1e3a5f;
  color: #00d4ff;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 12px;
  margin-right: auto;
}

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  text-align: right;
  padding: 8px 6px;
  color: #4a5568;
  font-weight: 500;
  font-size: 11px;
  border-bottom: 1px solid #1e3a5f;
  white-space: nowrap;
}
tbody td { padding: 8px 6px; border-bottom: 1px solid #1a2332; }
tbody tr:hover { background: rgba(30,58,95,0.3); }
.signal-asset { font-weight: 700; font-size: 13px; }
.signal-price { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; color: #8892b0; }
.signal-time { font-size: 10px; color: #4a5568; white-space: nowrap; }

.badge {
  padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
  display: inline-block;
}
.badge.buy { background: rgba(0,255,136,0.15); color: #00ff88; }
.badge.sell { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.badge.wait { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge.win { background: rgba(0,255,136,0.15); color: #00ff88; }
.badge.loss { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.badge.pending-status { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge.neutral { background: rgba(160,174,192,0.15); color: #a0aec0; }

.conf-bar {
  width: 60px; height: 3px;
  background: #1a2332; border-radius: 2px;
  display: inline-block; vertical-align: middle;
  margin-left: 6px;
}
.conf-fill { height: 100%; border-radius: 2px; }
.conf-fill.high { background: #00ff88; }
.conf-fill.med { background: #fbbf24; }
.conf-fill.low { background: #ff6b6b; }

/* Expand details */
.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-cell {
  padding: 10px 14px;
  background: rgba(10,14,23,0.5);
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.detail-item { text-align: center; }
.detail-item .lbl { font-size: 10px; color: #4a5568; }
.detail-item .val { font-size: 13px; font-weight: 700; margin-top: 2px; }
.detail-item .val.green { color: #00ff88; }
.detail-item .val.red { color: #ff6b6b; }
.expand-btn {
  background: none; border: 1px solid #1e3a5f;
  color: #8892b0; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  font-size: 11px;
}

/* Sidebar */
.side-col { display: flex; flex-direction: column; gap: 14px; }

/* Sentiment */
.sent-item {
  display: flex; align-items: center;
  gap: 8px; padding: 8px 0;
  border-bottom: 1px solid #1a2332;
  font-size: 12px;
}
.sent-item:last-child { border-bottom: none; }
.sent-icon { font-size: 16px; }
.sent-text { flex: 1; }
.sent-score {
  font-size: 11px; font-weight: 700;
  padding: 1px 8px; border-radius: 8px;
}
.sent-score.positive { background: rgba(0,255,136,0.15); color: #00ff88; }
.sent-score.negative { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.sent-score.neutral { background: rgba(160,174,192,0.15); color: #a0aec0; }

/* Alerts */
.alert-item {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #1a2332;
  font-size: 13px;
}
.alert-item:last-child { border-bottom: none; }
.alert-target { font-family: Consolas, monospace; color: #fbbf24; }

/* Empty */
.empty-state { text-align: center; padding: 30px 16px; color: #4a5568; }
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* Footer */
.footer {
  text-align: center; padding: 16px;
  color: #4a5568; font-size: 11px;
  border-top: 1px solid #1e3a5f;
}

/* Refresh bar */
#refreshBar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, #00d4ff, #007bff);
  width: 0%; z-index: 9999;
  transition: width 1s linear;
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-text">جاري تحميل البيانات...</div></div>
<div id="refreshBar"></div>

<header class="header">
  <div class="logo">A</div>
  <div class="header-title">AURA <span>CLOUD</span></div>
  <div class="header-right">
    <span class="status-dot online" id="statusDot"></span>
    <span style="font-size:12px;color:#8892b0" id="statusLabel">متصل</span>
    <span style="font-size:11px;color:#4a5568" id="lastUpdate">-</span>
  </div>
</header>

<div class="stats-grid" id="statsGrid"></div>

<div class="main-wrap">
  <div>
    <div class="card">
      <div class="card-title">📊 آخر الإشارات <span class="card-badge" id="signalCount">0</span></div>
      <table>
        <thead><tr>
          <th>الأصل</th><th>التوصية</th><th>السعر</th><th>الثقة</th><th>النتيجة</th><th>الوقت</th><th></th>
        </tr></thead>
        <tbody id="signalsBody"></tbody>
      </table>
      <div class="empty-state" id="emptySignals"><div class="icon">📡</div><p>لا توجد إشارات بعد</p></div>
    </div>
  </div>

  <div class="side-col">
    <div class="card">
      <div class="card-title">📰 تحليل المعنويات</div>
      <div id="sentimentList"><div class="empty-state"><div class="icon">💬</div><p>لا توجد أخبار</p></div></div>
    </div>
    <div class="card">
      <div class="card-title">🔔 التنبيهات <span class="card-badge" id="alertCount">0</span></div>
      <div id="alertList"><div class="empty-state"><div class="icon">🔕</div><p>لا توجد تنبيهات</p></div></div>
    </div>
  </div>
</div>

<div class="footer">AURA CLOUD Trading Bot &copy; 2026 | تحديث تلقائي كل 30 ثانية</div>

<script>
const DATA_URL = 'data.json';
let signals = [];

function fmt(ts) {
  if (!ts) return '-';
  try { return new Date(ts).toLocaleString('ar-EG', {hour:'2-digit',minute:'2-digit'}); } catch { return '-'; }
}

function confClass(v) { return v >= 75 ? 'high' : v >= 60 ? 'med' : 'low'; }

function toggleDetail(id) {
  var row = document.getElementById('d-' + id);
  if (row) row.classList.toggle('open');
}

function render(d) {
  signals = d.signals || [];
  var sentiment = d.sentiment || [];
  var alerts = d.alerts || [];
  var stats = d.stats || {};

  // Stats
  document.getElementById('statsGrid').innerHTML =
    '<div class=stat-card><div class=stat-label>إجمالي الإشارات</div><div class=stat-value>' + (stats.total_signals||0) + '</div></div>' +
    '<div class=stat-card><div class=stat-label>نسبة الربح</div><div class=stat-value>' + (stats.win_rate||0) + '%</div></div>' +
    '<div class=stat-card><div class=stat-label>التنبيهات</div><div class=stat-value>' + (stats.active_alerts||0) + '</div></div>' +
    '<div class=stat-card><div class=stat-label>متوسط الثقة</div><div class=stat-value>' + (stats.avg_confidence||0) + '%</div></div>';

  // Status
  var dot = document.getElementById('statusDot');
  document.getElementById('statusLabel').textContent = d.bot_status === 'online' ? 'متصل' : 'غير متصل';
  dot.className = 'status-dot ' + (d.bot_status === 'online' ? 'online' : 'offline');
  document.getElementById('lastUpdate').textContent = d.last_update ? fmt(d.last_update) : '';

  // Signals
  var tb = document.getElementById('signalsBody');
  var em = document.getElementById('emptySignals');
  document.getElementById('signalCount').textContent = signals.length + ' إشارة';

  if (signals.length === 0) {
    tb.innerHTML = '';
    em.style.display = 'block';
  } else {
    em.style.display = 'none';
    var html = '';
    for (var i = 0; i < signals.length; i++) {
      var s = signals[i];
      var rc = (s.recommendation||'').toLowerCase();
      var rs = s.result || 'pending-status';
      var cc = confClass(s.confidence);
      var rl = s.result === 'pending-status' ? '⏳' : s.result === 'win' ? '✅' : s.result === 'loss' ? '❌' : '⚪';
      html += '<tr onclick="toggleDetail(' + i + ')">' +
        '<td><span class="signal-asset">' + (s.asset||'-') + '</span></td>' +
        '<td><span class="badge ' + rc + '">' + (s.recommendation||'wait') + '</span></td>' +
        '<td><span class="signal-price">' + (s.price||'-') + '</span></td>' +
        '<td>' + (s.confidence||0) + '%<div class="conf-bar"><div class="conf-fill ' + cc + '" style="width:' + (s.confidence||0) + '%"></div></div></td>' +
        '<td><span class="badge ' + rs + '">' + rl + '</span></td>' +
        '<td><span class="signal-time">' + fmt(s.timestamp) + '</span></td>' +
        '<td><span class="expand-btn">▼</span></td></tr>' +
        '<tr class="detail-row" id="d-' + i + '"><td colspan=7 class="detail-cell"><div class="detail-grid">' +
        '<div class="detail-item"><div class="lbl">TP</div><div class="val green">' + (s.tp||'-') + '</div></div>' +
        '<div class="detail-item"><div class="lbl">SL</div><div class="val red">' + (s.sl||'-') + '</div></div>' +
        '<div class="detail-item"><div class="lbl">R/R</div><div class="val">' + (s.risk_reward||'-') + '</div></div>' +
        '<div class="detail-item"><div class="lbl">دعم</div><div class="val">' + (s.support||'-') + '</div></div>' +
        '<div class="detail-item"><div class="lbl">مقاومة</div><div class="val">' + (s.resistance||'-') + '</div></div>' +
        '<div class="detail-item"><div class="lbl">RSI</div><div class="val">' + (s.rsi||'-') + '</div></div>' +
        '</div></td></tr>';
    }
    tb.innerHTML = html;
  }

  // Sentiment
  var se = document.getElementById('sentimentList');
  if (sentiment.length === 0) {
    se.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>لا توجد أخبار محللة</p></div>';
  } else {
    var sh = '';
    for (var i = 0; i < sentiment.length; i++) {
      var si = sentiment[i];
      var sc = (si.label||'').includes('إيجابي') ? 'positive' : (si.label||'').includes('سلبي') ? 'negative' : 'neutral';
      var ic = (si.label||'').includes('إيجابي') ? '🟢' : (si.label||'').includes('سلبي') ? '🔴' : '⚪';
      sh += '<div class="sent-item"><span class="sent-icon">' + ic + '</span><span class="sent-text">' + (si.headline||'خبر').substring(0,60) + '</span><span class="sent-score ' + sc + '">' + (si.score||0) + '</span></div>';
    }
    se.innerHTML = sh;
  }

  // Alerts
  document.getElementById('alertCount').textContent = alerts.length;
  var ae = document.getElementById('alertList');
  if (alerts.length === 0) {
    ae.innerHTML = '<div class="empty-state"><div class="icon">🔕</div><p>لا توجد تنبيهات نشطة</p></div>';
  } else {
    var ah = '';
    for (var i = 0; i < alerts.length; i++) {
      ah += '<div class="alert-item"><span>' + (alerts[i].asset||'-') + '</span><span class="alert-target">' + (alerts[i].target||'-') + '</span></div>';
    }
    ae.innerHTML = ah;
  }

  document.getElementById('loading').classList.add('hidden');
}

function loadData() {
  var bar = document.getElementById('refreshBar');
  bar.style.width = '0%';
  setTimeout(function() { bar.style.width = '100%'; }, 50);

  var x = new XMLHttpRequest();
  x.onload = function() {
    try { render(JSON.parse(x.responseText)); } catch(e) { document.getElementById('loading').classList.add('hidden'); }
    bar.style.width = '0%';
  };
  x.onerror = function() {
    document.getElementById('loading').classList.add('hidden');
    bar.style.width = '0%';
  };
  x.open('GET', DATA_URL + '?t=' + Date.now(), true);
  x.send();
}

window.addEventListener('DOMContentLoaded', function() {
  loadData();
  setInterval(loadData, 30000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a0e1a">
<title>AURA — مراقبة الصفقات</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2444;--gold:#deadfd;--green:#00c853;--red:#ff1744;--yellow:#ffd600;--text:#d0d4dd;--text2:#888;--text3:#555;--border:#1a2444;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;padding:0;min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.97);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.hdr-l{display:flex;align-items:center;gap:5px}
.hdr-l .logo{font-size:15px;font-weight:700}
.hdr-l .gold{color:var(--gold)}
.st-badge{font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid;font-weight:600}
.st-badge.on{color:var(--green);border-color:#00c85344}
.st-badge.off{color:var(--red);border-color:#ff174444}
.hdr-r{display:flex;align-items:center;gap:3px}
.track-badge{background:var(--bg3);color:var(--gold);font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid var(--gold);font-weight:600;display:none}
.btn{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;background:var(--bg3);color:var(--text)}
.btn:hover{filter:brightness(1.2)}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-tg{background:#0088cc33;color:#0088cc}
.enter{background:#00c85333;color:var(--green)}
.skip{background:#ff174433;color:var(--red)}
.exit{background:#ffd60033;color:var(--yellow)}
.enter-s{background:var(--green);color:#000}
.skip-s{background:var(--red);color:#fff}

.tkr{overflow:hidden;background:#0d1225;border-bottom:1px solid var(--border);padding:5px 0;white-space:nowrap;position:relative;height:30px}
.tkr-inner{display:inline-flex;gap:14px;animation:scroll 90s linear infinite;padding:0 8px}
.tkr-item{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(26,36,68,.4)}
.tkr-sym{color:#9ca3af;font-weight:500}
.tkr-pr{font-weight:700;color:var(--text)}
.tkr-chg{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.tkr-chg.up{background:#00c85322;color:#00e676}
.tkr-chg.down{background:#ff174422;color:#ff5252}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.tkr:hover .tkr-inner{animation-play-state:paused}

.nav{display:flex;gap:2px;padding:5px 10px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:500;cursor:pointer;color:var(--text3);text-decoration:none;white-space:nowrap;transition:.2s}
.nav a:hover,.nav a.act{color:var(--gold);background:var(--bg3)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 12px}
.stat-c{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:8px 6px;text-align:center}
.stat-v{font-size:16px;font-weight:700}
.stat-l{font-size:9px;color:var(--text2);margin-top:1px}

.sec{padding:8px 12px}
.sec-t{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}

.sig{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:6px}
.sig-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sig-a{font-size:12px;font-weight:600}
.sig-r{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.sig-r.buy{background:#00c85322;color:var(--green)}
.sig-r.sell{background:#ff174422;color:var(--red)}
.sig-r.wait{background:#ffd60022;color:var(--yellow)}
.sig-p{font-size:15px;font-weight:700;margin-bottom:4px}
.sig-meta{display:flex;gap:8px;font-size:10px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap}
.sig-btns{display:flex;gap:4px;flex-wrap:wrap}
.sig-done{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:12px}
.loading{text-align:center;padding:40px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;min-height:60vh}

/* AI Analysis */
.ai-btn-row{display:flex;gap:4px;padding:0 12px 6px;flex-wrap:wrap}
.ai-btn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:500;cursor:pointer;color:var(--text);transition:.2s;text-align:center;flex:1;min-width:60px}
.ai-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--bg3)}
.ai-btn.act{border-color:var(--gold);background:var(--gold);color:#000;font-weight:700}
.ai-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:none}
.ai-card.show{display:block}
.ai-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ai-sym{font-size:16px;font-weight:700}
.ai-rec{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700}
.ai-rec.buy{background:#00c85322;color:#00e676;border:1px solid #00e67644}
.ai-rec.sell{background:#ff174422;color:#ff5252;border:1px solid #ff525244}
.ai-rec.wait{background:#ffd60022;color:#ffd600;border:1px solid #ffd60044}
.ai-price{font-size:24px;font-weight:800;margin-bottom:8px}
.ai-info{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;font-size:11px}
.ai-info span{background:var(--bg3);padding:5px 8px;border-radius:6px}
.ai-info span b{color:var(--text2)}
.ai-chart{width:100%;height:120px;border-radius:6px;margin-bottom:8px;background:var(--bg)}
.ai-reason{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.ai-actions{display:flex;gap:4px;border-top:1px solid var(--border);padding-top:8px}

.chat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px}
.chat-msgs{max-height:160px;overflow-y:auto;margin-bottom:6px;font-size:11px;scrollbar-width:thin}
.chat-msgs div{padding:3px 0;border-bottom:1px solid var(--border)}
.chat-msgs .user{color:var(--gold)}
.chat-msgs .ai{color:var(--text)}
.chat-inp{display:flex;gap:4px}
.chat-inp input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);font-size:12px;outline:none}
.chat-inp input:focus{border-color:var(--gold)}
.chat-inp button{background:var(--gold);color:#000;border:none;border-radius:6px;padding:6px 12px;font-weight:600;cursor:pointer;font-size:11px}

.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:4px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.log-entry .log-act{font-weight:600}
.log-entry .log-act.enter{color:var(--green)}
.log-entry .log-act.exit{color:var(--yellow)}
.log-entry .log-act.skip{color:var(--red)}
.log-entry .log-time{color:var(--text3);font-size:9px}
a{color:var(--gold);text-decoration:none}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;z-index:999;display:none;max-width:90%}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <span class="logo">🌀 <span class="gold">AURA</span></span>
    <span class="st-badge off" id="statusBadge"><span id="statusText">OFFLINE</span></span>
    <span class="track-badge" id="trackBadge" onclick="document.getElementById('sigSec').scrollIntoView({behavior:'smooth'})" style="cursor:pointer">🔍 0</span>
  </div>
  <div class="hdr-r">
    <span class="uptime" id="updateTime" style="font-size:9px;color:var(--text3)"></span>
    <a class="btn btn-sm btn-tg" href="https://t.me/Besmouchebot" target="_blank" title="البوت">📱</a>
    <button class="btn btn-sm" onclick="refreshData()" title="تحديث">↻</button>
  </div>
</div>

<div class="tkr" id="ticker"><div class="tkr-inner" id="tickerInner"></div></div>

<div class="nav" id="nav">
  <a href="#" class="act" onclick="sc('statsSec');return false">📊 الإحصائيات</a>
  <a href="#" onclick="sc('analyzeSec');return false">🤖 حلل</a>
  <a href="#" onclick="sc('sigSec');return false">📡 الإشارات</a>
  <a href="#" onclick="sc('logSec');return false">📋 السجل</a>
  <a href="#" onclick="sc('chatSec');return false">💬 AI</a>
</div>

<div id="loading">
  <div class="spin"></div>
  <p style="color:var(--text3);font-size:12px">🌀 AURA CLOUD</p>
  <p style="color:var(--text3);font-size:10px">جاري تحميل البيانات...</p>
  <button class="btn" id="retryBtn" onclick="loadData()" style="display:none">إعادة المحاولة</button>
</div>

<div id="app" style="display:none">

  <div class="ctrl-bar" style="display:flex;gap:4px;padding:0 12px 6px;flex-wrap:wrap">
    <button class="btn btn-sm" onclick="api('radar/toggle')">⏯ الرادار</button>
    <button class="btn btn-sm" onclick="api('radar/conf_up')">▲ ثقة+5</button>
    <button class="btn btn-sm" onclick="api('radar/conf_down')">▼ ثقة-5</button>
  </div>

  <!-- Stats -->
  <div class="sec" id="statsSec">
    <div class="sec-t"><span>📊 الإحصائيات</span><span id="statsTime" style="font-size:9px;color:var(--text3)"></span></div>
    <div class="stat-row" id="statsRow"></div>
  </div>

  <!-- AI Analysis -->
  <div class="sec" id="analyzeSec">
    <div class="sec-t"><span>🤖 التحليل بالذكاء الاصطناعي</span><span style="font-size:9px;color:var(--text3)">اختر الأصل</span></div>
    <div class="ai-btn-row" id="assetBtns"></div>
    <div class="ai-card" id="aiCard">
      <div class="ai-hdr">
        <span class="ai-sym" id="aiSym">EURUSD</span>
        <span class="ai-rec" id="aiRec">شراء</span>
      </div>
      <div class="ai-price" id="aiPrice">💰 1.1627</div>
      <div class="ai-info" id="aiInfo"></div>
      <canvas class="ai-chart" id="aiChart"></canvas>
      <div class="ai-reason" id="aiReason"></div>
      <div class="ai-actions" id="aiActions"></div>
    </div>
  </div>

  <!-- Signals -->
  <div class="sec" id="sigSec">
    <div class="sec-t"><span>📡 الإشارات</span><span id="sigCount" style="font-size:10px;color:var(--text3)">0</span></div>
    <div id="sigList"></div>
  </div>

  <!-- Log -->
  <div class="sec" id="logSec">
    <div class="sec-t"><span>📋 سجل الصفقات</span><span style="font-size:9px;color:var(--text3)">✅/🚪/⏭</span></div>
    <div id="logList"></div>
  </div>

  <!-- Chat -->
  <div class="sec" id="chatSec">
    <div class="sec-t"><span>💬 AI Chat</span></div>
    <div class="chat-box">
      <div class="chat-msgs" id="chatMsgs"><div class="ai">مرحباً! اسألني عن أي زوج.</div></div>
      <div class="chat-inp">
        <input id="chatInp" placeholder="مثلاً: حلل EURUSD..." onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">إرسال</button>
      </div>
    </div>
  </div>

</div>

<div class="notif" id="notif"></div>

<script>
const API = '';
let data = null;
let retries = 0;
const MAX_RETRIES = 5;
const TG_BOT = 'https://t.me/Besmouchebot';
let analyzingAsset = '';
const ASSETS = ['EURUSD','USDJPY','GBPUSD','AUDUSD','USDCAD','USDCHF','NZDUSD','GBPJPY','EURJPY','GBPAUD','EURCHF','XAUUSD','XAGUSD','BTCUSD'];
const AR_NAMES = {
  'EURUSD':'يورو','USDJPY':'دولار/ين','GBPUSD':'باوند','AUDUSD':'أسترالي','USDCAD':'دولار/كندي','USDCHF':'دولار/فرنك','NZDUSD':'نيوزيلندي',
  'GBPJPY':'باوند/ين','EURJPY':'يورو/ين','GBPAUD':'باوند/أسترالي','EURCHF':'يورو/فرنك',
  'XAUUSD':'ذهب','XAGUSD':'فضة','BTCUSD':'بيتكوين'
};
function matchAsset(text){
  const t=text.toUpperCase().replace(/\s/g,'');
  for(const a of ASSETS){if(t.includes(a))return a;}
  for(const[a,ar] of Object.entries(AR_NAMES)){if(text.includes(ar))return a;}
  return null;
}

function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='none';
  retries = 0; doFetch();
}

function doFetch(){
  fetch(API+'/data.json',{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
    .then(d=>{
      data = d;
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
      renderAll(d);
    })
    .catch(e=>{
      retries++;
      if(retries<MAX_RETRIES){
        const delay=[3,5,8,12,20][retries-1]||20;
        document.getElementById('loading').innerHTML=`<div class="spin"></div><p style="color:var(--text3);font-size:12px">🌀 ${retries}/${MAX_RETRIES}</p><p style="color:var(--text3);font-size:10px">خلال ${delay}ث</p>`;
        setTimeout(doFetch,delay*1000);
      } else {
        document.getElementById('loading').innerHTML=`<p style="color:var(--red);font-size:14px">❌ تعذر الاتصال</p><p style="font-size:11px;color:var(--text3)">${e.message}</p><p style="margin-top:12px"><a class="btn btn-tg" href="${TG_BOT}" target="_blank">📱 افتح البوت</a></p>`;
        document.getElementById('retryBtn').style.display='inline-block';
      }
    });
}

function renderAll(d){
  const online = d.bot_status === 'online';
  document.getElementById('statusBadge').className = 'st-badge '+(online?'on':'off');
  document.getElementById('statusText').textContent = online ? 'ONLINE' : 'OFFLINE';
  if(d.last_update) document.getElementById('updateTime').textContent = new Date(d.last_update).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

  // Track badge
  const sigs = d.signals||[];
  const tracking = sigs.filter(s=>s.user_entered&&!s.exit_price&&!s.user_skipped).length;
  const tb = document.getElementById('trackBadge');
  if(tracking>0){tb.style.display='inline-block';tb.textContent='🔍 '+tracking;}
  else tb.style.display='none';

  // Stats
  const ev = d.eval||{};
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-c"><div class="stat-v">${ev.total_signals||0}</div><div class="stat-l">📊 الكل</div></div>
    <div class="stat-c"><div class="stat-v" style="color:${ev.win_rate>=50?'var(--green)':'var(--red)'}">${ev.win_rate||0}%</div><div class="stat-l">✅ ربح</div></div>
    <div class="stat-c"><div class="stat-v" style="color:${ev.profit_factor>=1.5?'var(--green)':'var(--yellow)'}">${ev.profit_factor||0}</div><div class="stat-l">💰 PF</div></div>
    <div class="stat-c"><div class="stat-v" style="color:${ev.entered_win_rate>=50?'var(--green)':'var(--red)'}">${ev.entered_win_rate||0}%</div><div class="stat-l">🎯 دقة</div></div>
  `;
  document.getElementById('statsTime').textContent = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

  // Ticker
  const prices = d.price_history||{};
  const assets = Object.keys(prices);
  let tickerHtml = '';
  assets.forEach(a=>{
    const arr=prices[a];
    if(!Array.isArray(arr)||arr.length<2) return;
    const last=arr[arr.length-1], prev=arr[arr.length-2];
    const pc=((last-prev)/prev*100);
    const cls=pc>=0?'up':'down';
    const sym=a.replace('/','').replace('USDT','');
    const emoji=pc>=1.5?'🚀':(pc>=0.5?'📈':(pc<=-1.5?'💥':(pc<=-0.5?'📉':'➖')));
    tickerHtml+=`<span class="tkr-item"><span class="tkr-sym">${sym}</span><span class="tkr-pr">${last.toFixed(4)}</span><span class="tkr-chg ${cls}">${pc.toFixed(2)}% ${emoji}</span></span>`;
  });
  document.getElementById('tickerInner').innerHTML = tickerHtml + tickerHtml + tickerHtml;

  // AI Analysis buttons (show Arabic names + symbols)
  const ab = document.getElementById('assetBtns');
  ab.innerHTML = ASSETS.map(a => {
    const ar = AR_NAMES[a]||'';
    return `<div class="ai-btn" onclick="analyzeAsset('${a}')" data-asset="${a}">${ar?ar+' ':''}<span style="font-size:9px;color:var(--text3)">${a}</span></div>`;
  }).join('');

  // Signals
  document.getElementById('sigCount').textContent = sigs.length+' إشارة';
  const sigList = document.getElementById('sigList');
  if(!sigs.length){
    sigList.innerHTML = '<div class="empty">لا توجد إشارات — استخدم /analyze أو 🤖 حلل</div>';
  } else {
    sigList.innerHTML = sigs.slice().reverse().map(s=>{
      const rec=s.recommendation||'';
      const rcClass=rec.includes('شراء')||rec.includes('BUY')?'buy':(rec.includes('بيع')||rec.includes('SELL')?'sell':'wait');
      const isTracking=s.user_entered&&!s.exit_price&&!s.user_skipped;
      const isClosed=s.exit_price&&(s.result==='win'||s.result==='loss');
      const trackBar=isTracking?`<div style="font-size:9px;color:var(--gold);margin-bottom:4px;padding:3px 6px;background:var(--bg3);border-radius:4px;display:flex;align-items:center;gap:4px"><span class="spin" style="width:7px;height:7px;border-width:1.5px;display:inline-block"></span> مراقبة: TP ${s.tp||'--'} / SL ${s.sl||'--'}</div>`:'';
      let btns='';
      if(!s.user_entered&&!s.user_skipped) btns=`<button class="btn enter btn-sm" onclick="api('enter/${s.id}')">✅ دخلت</button><button class="btn skip btn-sm" onclick="api('skip/${s.id}')">⏭ تخطيت</button>`;
      else if(isTracking) btns=`<span class="sig-done" style="color:var(--green)">✅ متابعة 🔍</span><button class="btn exit btn-sm" onclick="api('exit/${s.id}')">🚪 خروج</button>`;
      else if(s.user_entered&&isClosed){
        const rc=s.result==='win'?'var(--green)':'var(--red)';
        const ri=s.result==='win'?'🏆':'💥';
        btns=`<span class="sig-done" style="color:${rc};font-weight:600">${ri} ${s.result==='win'?'ربح':'خسارة'}</span>`;
      } else btns=`<span class="sig-done">⏭ تخطيت</span>`;
      const exitInfo = isClosed?`<span>🚪 ${s.exit_price||'--'}</span>`:'';
      return `<div class="sig"><div class="sig-h"><span class="sig-a">${s.asset||''}</span><span class="sig-r ${rcClass}">${rec}</span></div>${trackBar}<div class="sig-p">💰 ${s.price||'--'}</div><div class="sig-meta"><span>🎯 ${s.tp||'--'}</span><span>🛑 ${s.sl||'--'}</span><span>📊 ${s.confidence||'?'}%</span>${s.risk_reward?`<span>⚖️ RR ${s.risk_reward}</span>`:''}${exitInfo}</div><div class="sig-btns">${btns}</div></div>`;
    }).join('');
  }

  // Log
  const logList = document.getElementById('logList');
  const actions = sigs.filter(s=>s.user_entered||s.user_skipped).slice(-50).reverse();
  if(!actions.length) logList.innerHTML='<div class="empty">لا توجد صفقات مسجلة بعد</div>';
  else logList.innerHTML=actions.map(s=>{
    let act='',cls='';
    if(s.user_entered&&s.exit_price&&s.result){act=`${s.result==='win'?'🏆 ربح':'💥 خسارة'}`;cls=s.result==='win'?'enter':'skip';}
    else if(s.user_entered&&!s.exit_price){act='✅ متابعة';cls='enter';}
    else if(s.user_entered){act='✅ دخلت';cls='enter';}
    else if(s.user_skipped){act='⏭ تخطيت';cls='skip';}
    const t=s.timestamp?new Date(s.timestamp).toLocaleString('ar-SA',{hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="log-entry"><span><span class="log-act ${cls}">${act}</span> ${s.asset||''} @ ${s.price||'--'}${s.exit_price?' → 🚪 '+s.exit_price:''}</span><span class="log-time">${t}</span></div>`;
  }).join('');

  // Nav highlight
  const secs=['statsSec','analyzeSec','sigSec','logSec','chatSec'];
  const navs=document.querySelectorAll('.nav a');
  let cur='';
  secs.forEach((id,i)=>{const el=document.getElementById(id);if(el&&el.getBoundingClientRect().top<window.innerHeight/3)cur=id;});
  navs.forEach(a=>a.classList.remove('act'));
  const idx=secs.indexOf(cur);
  if(idx>=0)navs[idx].classList.add('act');

  // Re-draw chart if analyzing
  if(analyzingAsset && document.getElementById('aiCard').classList.contains('show')) drawChart(analyzingAsset);
}

function drawChart(asset){
  if(!data||!data.price_history||!data.price_history[asset]) return;
  const pts=data.price_history[asset];
  if(!pts||pts.length<2) return;
  const canvas=document.getElementById('aiChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.clientWidth*2;
  const H=canvas.height=canvas.clientHeight*2;
  ctx.clearRect(0,0,W,H);
  const min=Math.min(...pts),max=Math.max(...pts),range=max-min||1;
  const pad=10;
  const drawW=W-pad*2,drawH=H-pad*2;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,pts[pts.length-1]>=pts[0]?'rgba(0,200,83,0.3)':'rgba(255,23,68,0.3)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(pad,H-pad-((pts[0]-min)/range)*drawH);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pad+(i/(pts.length-1))*drawW,H-pad-((pts[i]-min)/range)*drawH);
  ctx.strokeStyle=pts[pts.length-1]>=pts[0]?'#00e676':'#ff5252';
  ctx.lineWidth=3;
  ctx.stroke();
  // Fill
  ctx.lineTo(pad+(pts.length-1)/(pts.length-1)*drawW,H-pad);
  ctx.lineTo(pad,H-pad);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();
  // Labels
  ctx.fillStyle='#888';
  ctx.font='16px system-ui';
  ctx.fillText(max.toFixed(4),5,18);
  ctx.fillText(min.toFixed(4),5,H-5);
}

function analyzeAsset(asset){
  analyzingAsset = asset;
  document.querySelectorAll('.ai-btn').forEach(b=>b.classList.remove('act'));
  document.querySelector(`.ai-btn[data-asset="${asset}"]`).classList.add('act');
  const card=document.getElementById('aiCard');
  card.classList.remove('show');
  // Show loading on the card
  document.getElementById('aiSym').textContent=asset;
  card.classList.add('show');
  document.getElementById('aiPrice').textContent='🌀 جاري التحليل...';
  document.getElementById('aiRec').textContent='';
  document.getElementById('aiInfo').innerHTML='';
  document.getElementById('aiReason').textContent='';
  document.getElementById('aiActions').innerHTML='';
  fetch(API+'/api/analyze/'+asset,{method:'POST'})
    .then(r=>r.json())
    .then(d=>{
      if(!d.ok){document.getElementById('aiPrice').textContent='❌ فشل التحليل';return;}
      const s=d.signal||{};
      const rec=s.recommendation||'';
      const rcClass=rec.includes('شراء')||rec.includes('BUY')?'buy':(rec.includes('بيع')||rec.includes('SELL')?'sell':'wait');
      const rcColor=rcClass==='buy'?'#00e676':(rcClass==='sell'?'#ff5252':'#ffd600');
      document.getElementById('aiRec').textContent=rec;
      document.getElementById('aiRec').className='ai-rec '+rcClass;
      document.getElementById('aiPrice').textContent='💰 '+(s.price||'--');
      const conf=parseInt(s.confidence)||0;
      const confColor=conf>=80?'#00e676':(conf>=60?'#ffd600':'#ff5252');
      document.getElementById('aiInfo').innerHTML=`
        <span><b>🎯 TP</b> <span style="float:left;color:#00e676;font-weight:600">${s.tp||'--'}</span></span>
        <span><b>🛑 SL</b> <span style="float:left;color:#ff5252;font-weight:600">${s.sl||'--'}</span></span>
        <span><b>📊 الثقة</b> <span style="float:left;color:${confColor};font-weight:600">${conf}%</span></span>
        <span><b>⚖️ RR</b> <span style="float:left;font-weight:600">${s.risk_reward||'--'}</span></span>
        <span><b>📊 RSI</b> <span style="float:left;font-weight:600">${s.rsi?parseFloat(s.rsi).toFixed(1):'--'}</span></span>
        <span><b>✨ الحالة</b> <span style="float:left;font-weight:600">${s.sentiment_label||'--'}</span></span>
      `;
      document.getElementById('aiReason').textContent='📌 '+ (s.reason||'');
      const sigId=d.sig_id;
      document.getElementById('aiActions').innerHTML=`
        <button class="btn enter" style="flex:1;padding:6px" onclick="api('enter/${sigId}');showNotif('✅ سجلت الدخول');doFetch()">✅ دخلت</button>
        <button class="btn skip" style="flex:1;padding:6px" onclick="api('skip/${sigId}');showNotif('⏭ تخطيت');doFetch()">⏭ تخطيت</button>
      `;
      setTimeout(()=>drawChart(asset),100);
    })
    .catch(()=>{document.getElementById('aiPrice').textContent='❌ فشل الاتصال';});
}

function sc(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('act'));

}

function api(path){
  fetch(API+'/api/'+path,{method:'POST'}).then(r=>r.json()).then(d=>{showNotif('✅ تم التسجيل');doFetch();}).catch(()=>showNotif('❌ فشل'));
}
